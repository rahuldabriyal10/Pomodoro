<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Pomodoro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="image_res/bg_v5.mp4" type="video/mp4">
    </video>
    <audio id="bgMusic" loop src="music/bgmusic.mp3"></audio>
    <audio id="notifySound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    
    <div class="top-nav">
        <div class="nav-logo">
            PomoSakura 
            <img src="https://api.iconify.design/twemoji:cherry-blossom.svg" alt="Sakura" class="sakura-icon">
        </div>
        
        <div class="nav-buttons">
            <button id="authBtn" title="Account Login">👤</button>
            <button id="taskBtn" title="Tasks">☑️</button>
            <button id="statsBtn" title="Statistics">📊</button>
            <button id="leaderboardBtn" title="Leaderboard">🏆</button>
            <button id="fullscreenBtn" title="Full Screen">⛶</button>
        </div>
    </div>

    <div class="container theme-focus" id="timerContainer">
        
        <div class="audio-widget">
            <div class="music-btn" id="musicBtn">🎵</div>
            <div class="audio-settings" id="audioSettings">
                <select id="musicSelector" class="glass-select">
                    <option value="music/101.mp3">Lofi Beats</option>
                    <option value="music/102.mp3">Night Forest</option>
                    <option value="music/103.mp3">Ocean Waves</option>
                </select>
                <div class="slider-container">
                    <span>🔉</span>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5">
                    <span>🔊</span>
                </div>
            </div>
        </div>

        <div class="mode-tabs">
            <button id="tab-focus" class="tab active" onclick="switchMode('focus')">Focus</button>
            <button id="tab-short" class="tab" onclick="switchMode('short')">Short Break</button>
            <button id="tab-long" class="tab" onclick="switchMode('long')">Long Break</button>
        </div>

        <div class="session-tracker" id="sessionTracker">Sessions: 0/4</div>
        <div class="timer">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <span class="runner">🦊</span>
            </div>
        </div>
        
        <div class="controls">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
    
        <div class="modal" id="taskModal">
            <button class="close-btn" onclick="closeModals()">✖</button>
            <h2>📝 Tasks</h2>
            <div class="task-input-area">
                <input type="text" id="taskInput" placeholder="What needs to be done?">
                <button onclick="addTask()">Add</button>
            </div>
            <ul class="task-list" id="taskList">
            </ul>
        </div>

        <div class="modal" id="statsModal">
            <button class="close-btn" onclick="closeModals()">✖</button>
            <h2>📊 Statistics</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="totalSessionsStat">0</div>
                    <div class="stat-label">Focus Sessions</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="totalMinutesStat">0</div>
                    <div class="stat-label">Focus Minutes</div>
                </div>
            </div>
        </div>

        <div class="modal" id="authModal">
            <button class="close-btn" onclick="closeModals()">✖</button>
            <h2 id="authTitle">🔑 Login</h2>
            <div style="display:flex; flex-direction:column; gap:15px; margin-top: 10px;">
                <input type="email" id="authEmail" placeholder="Email Address" class="glass-input">
                <input type="password" id="authPassword" placeholder="Password" class="glass-input">
                <button id="submitAuthBtn" class="primary-action-btn">Sign In</button>
                <p id="toggleAuthMode" style="cursor:pointer; font-size:12px; text-align:center; color:#ffb347;">Need an account? Register</p>
                <p id="authMessage" style="font-size:12px; text-align:center; color:#ff5555;"></p>
            </div>
        </div>

        <div class="modal" id="profileModal">
            <button class="close-btn" onclick="closeModals()">✖</button>
            <h2>👤 Profile</h2>
            <div style="display:flex; flex-direction:column; gap:15px; margin-top: 10px;">
                <div style="text-align: center; margin-bottom: 5px;">
                    <span id="profileEmailDisplay" style="font-size: 0.9rem; opacity: 0.8;">Loading...</span>
                </div>
                <input type="text" id="profileDisplayName" placeholder="Display Name" class="glass-input">
                <input type="text" id="profileStudyGoal" placeholder="Study Goal (e.g., Code for 2 hours)" class="glass-input">
                <button id="saveProfileBtn" class="primary-action-btn">Save Changes</button>
                <button id="logoutBtn" class="primary-action-btn" style="background: rgba(255, 85, 85, 0.2); border: 1px solid #ff5555; color: #ff5555;">Log Out</button>
                <p id="profileMessage" style="font-size:12px; text-align:center;"></p>
            </div>
        </div>
        
        <div class="modal" id="leaderboardModal">
            <button class="close-btn" onclick="closeModals()">✖</button>
            <h2>🏆 Top Focusers</h2>
            <p style="text-align: center; font-size: 0.9rem; opacity: 0.8; margin-bottom: 15px;">Global Ranking</p>
            <ul id="leaderboardList" class="task-list" style="max-height: 250px; overflow-y: auto;">
            </ul>
        </div>
    
    </div>

    <script type="module" src="firebase-service.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
